<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="//cdn.dynamicyield.com" />
    <link rel="preconnect" href="//st.dynamicyield.com" />
    <link rel="preconnect" href="//rcom.dynamicyield.com" />
    <script type="text/javascript">
      window.DY = window.DY || {};
      window.DY.noCookies = true;
      (function () {
        var path = window.location.pathname || '/';
        if (path.length > 1 && path.charAt(path.length - 1) === '/') {
          path = path.slice(0, -1);
        }

        if (path === '/') {
          window.DY.recommendationContext = { type: 'HOMEPAGE' };
          return;
        }

        if (path.indexOf('/offers/') === 0 && path.length > '/offers/'.length) {
          var sku = decodeURIComponent(path.slice('/offers/'.length));
          window.DY.recommendationContext = { type: 'PRODUCT', data: [sku] };
          return;
        }

        if (path === '/offers') {
          window.DY.recommendationContext = { type: 'CATEGORY', data: ['Offers'] };
          return;
        }

        window.DY.recommendationContext = { type: 'OTHER', data: [] };
      })();
    </script>
    <script type="text/javascript" src="//cdn.dynamicyield.com/api/8794982/api_dynamic.js"></script>
    <script type="text/javascript" src="//cdn.dynamicyield.com/api/8794982/api_static.js"></script>
    <title>Mastercard Cardholder Offers</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
